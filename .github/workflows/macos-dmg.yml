name: macOS DMG Build

on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.2.0)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  MAIN_SCRIPT: "rigel_main.py"
  SETUP_SCRIPT: "rigel_setup.py"

jobs:
  build-dmg:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Trial
            trial_mode: "true"
            app_name: "RIGEL Business Trial.app"
            volume_name: "RIGEL Business Trial"
          - build_type: Full
            trial_mode: "false"
            app_name: "RIGEL Business.app"
            volume_name: "RIGEL Business"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          brew install create-dmg
          python -m pip install --upgrade pip
          pip install -r requirements.txt py2app

      - name: Build .app with py2app
        run: |
          echo "Building ${{ matrix.build_type }} version..."
          python ${{ env.SETUP_SCRIPT }} py2app
          
          # Rename output if needed
          if [ -d "dist/RIGEL Business.app" ]; then
            mv "dist/RIGEL Business.app" "dist/${{ matrix.app_name }}"
          elif [ -d "dist/rigel_main.app" ]; then
            mv "dist/rigel_main.app" "dist/${{ matrix.app_name }}"
          fi

          ls -la dist/

      - name: Create DMG
        run: |
          DMG_NAME="RIGEL-Business-${{ matrix.build_type }}-${{ github.event.inputs.version || 'dev' }}.dmg"
          
          create-dmg \
            --volname "${{ matrix.volume_name }}" \
            --window-size 660 420 \
            --icon-size 128 \
            --app-drop-link 480 190 \
            --overwrite \
            "$DMG_NAME" \
            "dist/${{ matrix.app_name }}"
          
          echo "✅ DMG created: $DMG_NAME"