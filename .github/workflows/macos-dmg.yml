name: macOS DMG Build

on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.2.0)"
        required: false
        default: ""
      publish_release:
        description: "Create a GitHub Release?"
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "RIGEL Business"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo "0.0.0-$(date -u +%Y%m%d)")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-dmg:
    needs: resolve-version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Trial
            trial_mode: "true"
            app_name: "RIGEL Business Trial.app"
            dmg_name: "RIGEL-Business-Trial-${{ needs.resolve-version.outputs.version }}.dmg"
            volume_name: "RIGEL Business Trial"
          - build_type: Full
            trial_mode: "false"
            app_name: "RIGEL Business.app"
            dmg_name: "RIGEL-Business-${{ needs.resolve-version.outputs.version }}.dmg"
            volume_name: "RIGEL Business"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          brew install create-dmg
          python -m pip install --upgrade pip
          pip install -r requirements.txt py2app

      - name: Build .app
        run: |
          python setup.py py2app
          mv "dist/${APP_NAME}.app" "dist/${{ matrix.app_name }}"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "${{ matrix.volume_name }}" \
            --window-size 660 400 \
            --icon-size 128 \
            --app-drop-link 480 190 \
            "${{ matrix.dmg_name }}" \
            "dist/${{ matrix.app_name }}"